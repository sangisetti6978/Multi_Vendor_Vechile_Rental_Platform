services:
  - type: web
    name: vehicle-rental-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: UPLOAD_DIR
        value: /app/uploads
        sync: false
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 10

  - type: static_site
    name: vehicle-rental-frontend
    rootDir: frontend
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /
        destination: /index.html
