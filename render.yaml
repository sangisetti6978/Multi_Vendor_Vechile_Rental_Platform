services:
  - type: web
    name: vehicle-rental-backend
    runtime: java
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/vehicle-rental-platform-1.0.0.jar
    envVars:
      - key: PORT
        sync: false
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  - type: static
    name: vehicle-rental-frontend
    rootDir: frontend
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /
        destination: /index.html
