spring.application.name=Vehicle Rental Platform
server.port=8888

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/carrental_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation2024VehicleRentalPlatform}
jwt.expiration=86400000

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads/vehicles

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html