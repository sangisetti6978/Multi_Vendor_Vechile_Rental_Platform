spring.application.name=Vehicle Rental Platform
server.port=${PORT:8888}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/carrental_db}
spring.datasource.username=${DB_USERNAME:vehiclerental}
spring.datasource.password=${DB_PASSWORD:password123}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation2024VehicleRentalPlatform}
jwt.expiration=86400000

# Booking Configuration
booking.cancellation.delay=120

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads/vehicles

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html





