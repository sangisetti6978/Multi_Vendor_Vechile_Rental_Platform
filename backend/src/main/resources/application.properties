# ===============================
# APPLICATION
# ===============================
spring.application.name=Vehicle Rental Platform

# ===============================
# SERVER CONFIG (Render uses 8080)
# ===============================
server.port=8080

# ===============================
# DATABASE CONFIG (PostgreSQL)
# ===============================
spring.datasource.url=${postgresql://vehicle_user:yFMyUJpnHuwhlQBgnA4dAxImdMqvP3O7@dpg-d76hskruibrs73919i40-a/vehicle_rental_dzie}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation2024VehicleRentalPlatform}
jwt.expiration=86400000

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads/vehicles

# ===============================
# SWAGGER (OPTIONAL)
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# LOGGING (OPTIONAL)
# ===============================
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
